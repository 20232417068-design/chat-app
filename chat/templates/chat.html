<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #e0eafc, #cfdef3);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 400px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* ✅ FIXED HEADER */
        .header {
            background: #4CAF50;
            color: white;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ✅ BIG ROUND DELETE BUTTON */
        .clear-btn {
            background: white;
            color: black;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .clear-btn:hover {
            background: #f1f1f1;
            transform: scale(1.1);
        }

        #messages {
            height: 320px;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f9f9f9;
        }

        .message {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 70%;
            font-size: 14px;
        }

        .sent {
            background: #4CAF50;
            color: white;
            align-self: flex-end;
        }

        .received {
            background: #e4e6eb;
            align-self: flex-start;
        }

        .emoji-bar {
            display: flex;
            gap: 10px;
            padding: 8px;
            border-top: 1px solid #ddd;
            background: #fff;
            justify-content: center;
        }

        .emoji {
            cursor: pointer;
            font-size: 18px;
        }

        .emoji:hover {
            transform: scale(1.3);
        }

        .input-area {
            display: flex;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button.send-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 18px;
            cursor: pointer;
            font-weight: bold;
        }

        button.send-btn:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

<div class="chat-container">

    <!-- ✅ FIXED HEADER -->
    <div class="header">
        💬 Chat App
        <button onclick="clearChat()" class="clear-btn">🗑</button>
    </div>

    <div id="messages"></div>

    <!-- Emoji Bar -->
    <div class="emoji-bar">
        <span class="emoji" onclick="addEmoji('😀')">😀</span>
        <span class="emoji" onclick="addEmoji('😂')">😂</span>
        <span class="emoji" onclick="addEmoji('😍')">😍</span>
        <span class="emoji" onclick="addEmoji('😎')">😎</span>
        <span class="emoji" onclick="addEmoji('🔥')">🔥</span>
        <span class="emoji" onclick="addEmoji('❤️')">❤️</span>
    </div>

    <div class="input-area">
        <input id="messageInput" type="text" placeholder="Type message...">
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
let socket = new WebSocket("ws://127.0.0.1:8000/ws/chat/");

let username = prompt("Enter your name:") || "User";

function scrollToBottom() {
    let messages = document.getElementById("messages");
    messages.scrollTop = messages.scrollHeight;
}

socket.onmessage = function(e) {
    let data = JSON.parse(e.data);

    let div = document.createElement("div");
    div.classList.add("message", "received");

    let time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

    div.innerHTML = `
        <b>${data.user}</b><br>
        ${data.message}
        <div style="font-size:10px; opacity:0.6;">${time}</div>
    `;

    document.getElementById("messages").appendChild(div);
    scrollToBottom();
};

function sendMessage() {
    let input = document.getElementById("messageInput");
    let message = input.value;

    if(message.trim() === "") return;

    let div = document.createElement("div");
    div.classList.add("message", "sent");

    let time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

    div.innerHTML = `
        ${message}
        <div style="font-size:10px;">✔ ${time}</div>
    `;

    document.getElementById("messages").appendChild(div);

    socket.send(JSON.stringify({
        'message': message,
        'user': username
    }));

    input.value = "";
    scrollToBottom();
}

document.getElementById("messageInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

function addEmoji(emoji) {
    let input = document.getElementById("messageInput");
    input.value += emoji;
}

function clearChat() {
    if(confirm("Clear all messages?")) {
        document.getElementById("messages").innerHTML = "";
    }
}
</script>

</body>
</html>
